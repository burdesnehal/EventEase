version: '3.8'

services:
  mongodb:
    image: mongo:7-jammy
    container_name: geofence_mongodb
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - geofence_network

  backend-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: geofence_backend_dev
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - mongodb
    networks:
      - geofence_network
    profiles:
      - dev

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: geofence_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - geofence_network
    profiles:
      - prod
      
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
networks:
  geofence_network:
    driver: bridge
